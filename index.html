<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Гаражный Выживач</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f13;
            color: #f1f1f6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
        }
        .container {
            width: 100%;
            max-width: 480px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        h1 {
            font-size: 22px;
            text-align: center;
            margin: 6px 0 4px 0;
            color: #ff9f43;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .panel {
            background: #1b1b22;
            border-radius: 14px;
            padding: 16px;
            border: 1px solid #2c2c38;
            box-shadow: 0 6px 16px rgba(0,0,0,0.4);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 12px;
        }
        .stat-box {
            background: #23232d;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #323242;
        }
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #00d2d3;
        }
        .stat-label {
            font-size: 11px;
            color: #88889d;
            margin-top: 4px;
            text-transform: uppercase;
        }
        .main-button {
            width: 100%;
            padding: 20px;
            background: #ff9f43;
            color: #1a1a21;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #d35400;
            transition: transform 0.05s, box-shadow 0.05s;
        }
        .main-button:active, .main-button.pressed {
            transform: translateY(5px);
            box-shadow: 0 0 0 #d35400;
            background: #e67e22;
        }
        .section-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #88889d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .upgrades-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 280px;
            overflow-y: auto;
        }
        .upgrade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #23232d;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #323242;
        }
        .upgrade-info {
            display: flex;
            flex-direction: column;
        }
        .upgrade-name {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
        }
        .upgrade-cost {
            font-size: 12px;
            color: #ff9f43;
            margin-top: 3px;
        }
        .buy-btn {
            background: #2ed573;
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .buy-btn:disabled {
            background: #2c2c38;
            color: #57576b;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🛵 Гаражный Выживач</h1>

    <div class="panel">
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-value" id="money">0</div>
                <div class="stat-label">Детали ($)</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="rps">0</div>
                <div class="stat-label">В секунду</div>
            </div>
        </div>
        
        <button class="main-button" id="workBtn">КРУТИТЬ ГАЙКУ</button>
    </div>

    <div class="panel">
        <div class="section-title">Апгрейды гаража</div>
        <div class="upgrades-list" id="upgradesList"></div>
    </div>
</div>

<script>
    let state = {
        money: 0,
        clickPower: 1,
        perSec: 0,
        upgrades: [
            { id: 'wrench', name: 'Набор ключей', cost: 15, rps: 1, count: 0 },
            { id: 'compressor', name: 'Компрессор', cost: 100, rps: 6, count: 0 },
            { id: 'f80', name: 'Мотор F80', cost: 600, rps: 35, count: 0 },
            { id: 'peltier', name: 'Пельтье-кулер', cost: 2500, rps: 150, count: 0 }
        ]
    };

    const moneyEl = document.getElementById('money');
    const rpsEl = document.getElementById('rps');
    const workBtn = document.getElementById('workBtn');
    const upgradesListEl = document.getElementById('upgradesList');

    function renderUpgrades() {
        upgradesListEl.innerHTML = '';
        state.upgrades.forEach(upg => {
            const item = document.createElement('div');
            item.className = 'upgrade-item';
            item.innerHTML = `
                <div class="upgrade-info">
                    <span class="upgrade-name">${upg.name} (${upg.count})</span>
                    <span class="upgrade-cost">${upg.cost} деталей</span>
                </div>
                <button class="buy-btn" ${state.money < upg.cost ? 'disabled' : ''} onclick="buyUpgrade('${upg.id}')">Купить</button>
            `;
            upgradesListEl.appendChild(item);
        });
    }

    function updateUI() {
        moneyEl.innerText = Math.floor(state.money);
        rpsEl.innerText = state.perSec;
        renderUpgrades();
    }

    function doWork() {
        state.money += state.clickPower;
        updateUI();
    }

    workBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        doWork();
        workBtn.classList.add('pressed');
    }, {passive: false});

    workBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        workBtn.classList.remove('pressed');
    }, {passive: false});

    workBtn.addEventListener('mousedown', () => {
        doWork();
        workBtn.classList.add('pressed');
    });

    workBtn.addEventListener('mouseup', () => {
        workBtn.classList.remove('pressed');
    });

    window.buyUpgrade = function(id) {
        const upg = state.upgrades.find(u => u.id === id);
        if (state.money >= upg.cost) {
            state.money -= upg.cost;
            upg.count++;
            state.perSec += upg.rps;
            upg.cost = Math.floor(upg.cost * 1.35);
            updateUI();
        }
    };

    setInterval(() => {
        if (state.perSec > 0) {
            state.money += state.perSec / 10;
            updateUI();
        }
    }, 100);

    updateUI();
</script>

</body>
</html>
